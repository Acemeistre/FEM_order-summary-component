<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css" type="text/css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Order summary card</title>
</head>

  <body>
    <div class="container">
      <img src="images/illustration-hero.svg" alt="music banner illustration">
      <div class="order-info">
        <h1>Order Summary</h1>
        <p>You can now listen to millions of songs, audiobooks, and podcasts on any 
          device anywhere you like!</p>
        <div class="cta">
          <img src="images/icon-music.svg" aria-hidden="true">
          <div class="plan">
            <p class="main">Annual Plan</p>
            <p>$59.99/year</p>
          </div>
          <a class="change" href="#">Change</a>
        </div>
        <button class="btn">Proceed to Payment</button>
        <a class="cancel" href="#">Cancel Order</a>
      </div>
    </div>  
  </body>
</html>
